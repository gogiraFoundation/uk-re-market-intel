[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
exclude = [
    "build/",
    "dist/",
    "\\.venv/",
]

[tool.ruff]
target-version = "py311"
extend-exclude = [
    "dq_run_*",
    "cleaned_data",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"
