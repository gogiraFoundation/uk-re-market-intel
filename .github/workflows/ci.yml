name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check scripts streamlit_app tests

      - name: Type check (mypy)
        run: mypy scripts streamlit_app

      - name: Run tests with coverage
        run: pytest tests/ --cov=scripts --cov=streamlit_app --cov-report=xml --cov-report=term-missing

      - name: Audit dependencies
        run: pip-audit --requirement requirements.txt --strict || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
